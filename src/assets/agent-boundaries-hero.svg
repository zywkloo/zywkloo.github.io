<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Agent boundaries and verification</title>
  <desc id="desc">Codex and Claude Code agent loops feeding a git-native wtcraft coordination layer with scope, ledger, and verification.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.45" stop-color="#eef6f4"/>
      <stop offset="1" stop-color="#fff6ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L11 7 L1 13 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <path d="M0 470 C170 430 280 520 430 482 C600 438 670 355 850 385 C1010 412 1088 505 1200 462 L1200 600 L0 600 Z" fill="#0f172a" opacity="0.055"/>
  <path d="M62 88 H1138" stroke="#cbd5e1" stroke-width="1"/>
  <path d="M62 512 H1138" stroke="#cbd5e1" stroke-width="1"/>

  <g transform="translate(72 86)">
    <text x="0" y="0" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="800">Do not build another agent</text>
    <text x="0" y="46" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="600">Keep the boundaries clear between agent loops.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="78" y="202" width="288" height="176" rx="8" fill="#ffffff"/>
    <rect x="78" y="202" width="288" height="8" rx="4" fill="#111827"/>
    <text x="110" y="250" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800">Codex</text>
    <text x="110" y="286" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">runtime surface</text>
    <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round">
      <path d="M118 328 C132 300 178 300 192 328"/>
      <path d="M192 328 C206 356 252 356 266 328"/>
      <path d="M266 328 C280 300 326 300 340 328"/>
    </g>
    <text x="110" y="354" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">tools -> events -> ledger</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="834" y="202" width="288" height="176" rx="8" fill="#ffffff"/>
    <rect x="834" y="202" width="288" height="8" rx="4" fill="#b45309"/>
    <text x="866" y="250" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800">Claude Code</text>
    <text x="866" y="286" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">workflow surface</text>
    <g fill="none" stroke="#b45309" stroke-width="3" stroke-linecap="round">
      <path d="M874 329 H928"/>
      <path d="M928 329 C962 329 962 305 995 305 H1050"/>
      <path d="M928 329 C962 329 962 353 995 353 H1050"/>
    </g>
    <text x="866" y="354" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">commands -> hooks -> skills</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="438" y="184" width="324" height="220" rx="8" fill="#0f172a"/>
    <rect x="462" y="214" width="276" height="46" rx="6" fill="#f8fafc"/>
    <text x="492" y="245" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="900">wtcraft</text>
    <text x="462" y="298" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">git-native boundaries</text>
    <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">
      <rect x="462" y="322" width="84" height="34" rx="5" fill="#14b8a6"/>
      <text x="484" y="344" fill="#ffffff">Scope</text>
      <rect x="562" y="322" width="84" height="34" rx="5" fill="#ef4444"/>
      <text x="581" y="344" fill="#ffffff">Limits</text>
      <rect x="662" y="322" width="76" height="34" rx="5" fill="#f59e0b"/>
      <text x="681" y="344" fill="#111827">Verify</text>
    </g>
    <text x="462" y="378" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">contract + run ledger + review gate</text>
  </g>

  <path d="M366 290 H426" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M834 290 H774" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(208 454)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="784" height="52" rx="8" fill="#ffffff" opacity="0.92"/>
    <text x="28" y="33" fill="#334155" font-size="18" font-weight="700">Model tool loop</text>
    <text x="232" y="33" fill="#94a3b8" font-size="18" font-weight="700">/</text>
    <text x="278" y="33" fill="#334155" font-size="18" font-weight="700">Workflow loop</text>
    <text x="478" y="33" fill="#94a3b8" font-size="18" font-weight="700">/</text>
    <text x="524" y="33" fill="#0f766e" font-size="18" font-weight="800">Supervision loop</text>
  </g>
</svg>
