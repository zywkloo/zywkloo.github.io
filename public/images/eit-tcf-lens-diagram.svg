<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">EIT-TCF semantic design lens</title>
  <desc id="desc">A radial diagram showing Entity, Invariant, Transition, Time, Consistency, and Failure around executable semantics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08142d"/>
      <stop offset="100%" stop-color="#13274b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39d3ff"/>
      <stop offset="100%" stop-color="#7f8cff"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>

  <g opacity="0.2" stroke="#4aa8ff" stroke-width="1">
    <path d="M0 100h1200M0 180h1200M0 260h1200M0 340h1200M0 420h1200M0 500h1200M0 580h1200"/>
    <path d="M100 0v700M220 0v700M340 0v700M460 0v700M580 0v700M700 0v700M820 0v700M940 0v700M1060 0v700"/>
  </g>

  <g transform="translate(600,350)">
    <circle r="175" fill="none" stroke="url(#ring)" stroke-width="26" filter="url(#softGlow)"/>
    <circle r="130" fill="#0f2241" stroke="#65e0ff" stroke-width="2"/>
    <text x="0" y="-14" font-size="40" text-anchor="middle" fill="#d8f8ff" font-family="Atkinson, Arial, sans-serif" font-weight="700">EIT-TCF</text>
    <text x="0" y="22" font-size="28" text-anchor="middle" fill="#b8defa" font-family="Atkinson, Arial, sans-serif">Executable</text>
    <text x="0" y="56" font-size="28" text-anchor="middle" fill="#b8defa" font-family="Atkinson, Arial, sans-serif">Semantics</text>
  </g>

  <g font-family="Atkinson, Arial, sans-serif" font-size="26" fill="#eef8ff" text-anchor="middle">
    <g transform="translate(600,88)">
      <rect x="-105" y="-34" width="210" height="68" rx="16" fill="#13315d" stroke="#4ad7ff" stroke-width="2"/>
      <text y="10" font-weight="700">Entity</text>
    </g>
    <g transform="translate(862,220)">
      <rect x="-128" y="-34" width="256" height="68" rx="16" fill="#16345f" stroke="#52e0ff" stroke-width="2"/>
      <text y="10" font-weight="700">Invariant</text>
    </g>
    <g transform="translate(862,480)">
      <rect x="-134" y="-34" width="268" height="68" rx="16" fill="#1a3663" stroke="#63e6ff" stroke-width="2"/>
      <text y="10" font-weight="700">Transition</text>
    </g>
    <g transform="translate(600,612)">
      <rect x="-95" y="-34" width="190" height="68" rx="16" fill="#15315c" stroke="#62deff" stroke-width="2"/>
      <text y="10" font-weight="700">Time</text>
    </g>
    <g transform="translate(338,480)">
      <rect x="-145" y="-34" width="290" height="68" rx="16" fill="#17315b" stroke="#5edfff" stroke-width="2"/>
      <text y="10" font-weight="700">Consistency</text>
    </g>
    <g transform="translate(338,220)">
      <rect x="-106" y="-34" width="212" height="68" rx="16" fill="#16305a" stroke="#57dcff" stroke-width="2"/>
      <text y="10" font-weight="700">Failure</text>
    </g>
  </g>

  <g stroke="#7bd9ff" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#7bd9ff"/>
      </marker>
    </defs>
    <path d="M600 160 L600 205"/>
    <path d="M780 245 L735 268"/>
    <path d="M780 455 L735 432"/>
    <path d="M600 540 L600 495"/>
    <path d="M420 455 L465 432"/>
    <path d="M420 245 L465 268"/>
  </g>

  <text x="600" y="42" text-anchor="middle" fill="#cfe8ff" font-size="34" font-family="Atkinson, Arial, sans-serif" font-weight="700">
    EIT-TCF Lens for Semantic Design
  </text>
</svg>
